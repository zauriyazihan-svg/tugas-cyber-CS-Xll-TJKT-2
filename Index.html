<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="tiktok-container">
        <div class="video-placeholder">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>
        </div>

        <div class="warning-overlay">
            <div class="warning-content">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Tindakan dalam video ini dilakukan oleh profesional. Jangan mencoba di rumah.</p>
                <button onclick="this.parentElement.parentElement.style.display='none'">Paham</button>
            </div>
        </div>

        <div class="side-bar">
            <div class="icon-group">
                <i class="fas fa-heart"></i>
                <span>1.2M</span>
            </div>
            <div class="icon-group">
                <i class="fas fa-comment-dots"></i>
                <span>850</span>
            </div>
            <div class="icon-group">
                <i class="fas fa-bookmark"></i>
                <span>45K</span>
            </div>
            <div class="icon-group">
                <i class="fas fa-share"></i>
                <span>10K</span>
            </div>
        </div>

        <div class="video-details">
            <h3>@kreator_keren</h3>
            <p>Eksperimen sains tingkat tinggi! #science #fyp #trending</p>
            <div class="music-info">
                <i class="fas fa-music"></i>
                <marquee direction="left">Suara asli - Kreator Keren - 2024</marquee>
            </div>
        </div>

        <nav class="bottom-nav">
            <i class="fas fa-home"></i>
            <i class="fas fa-users"></i>
            <div class="plus-icon">+</div>
            <i class="fas fa-inbox"></i>
            <i class="fas fa-user"></i>
        </nav>
    </div>

</body>
</html>
